<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Dodge - サイバーパンク回避ゲーム</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #050510;
    color: #0ff;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #gameCanvas {
    box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
    background: #000;
    cursor: none;
  }
  #ui {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
    text-shadow: 0 0 5px #0ff;
    pointer-events: none;
    z-index: 10;
  }
  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0, 0, 0, 0.85);
    padding: 40px;
    border: 2px solid #f0f;
    box-shadow: 0 0 20px #f0f, inset 0 0 10px #f0f;
    display: none;
    z-index: 20;
    backdrop-filter: blur(4px);
  }
  #gameOver h1 {
    color: #f0f;
    text-shadow: 0 0 10px #f0f;
    margin-top: 0;
    font-size: 36px;
    letter-spacing: 2px;
  }
  button {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    padding: 12px 30px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    text-shadow: 0 0 5px #0ff;
    box-shadow: 0 0 10px #0ff inset;
    transition: all 0.2s;
    margin-top: 20px;
  }
  button:hover {
    background: #0ff;
    color: #000;
    box-shadow: 0 0 20px #0ff;
  }
</style>
</head>
<body>
<div id="ui">SCORE: <span id="score">0</span></div>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="gameOver">
  <h1>SYSTEM FAILURE</h1>
  <p>FINAL SCORE: <span id="finalScore">0</span></p>
  <button id="restartBtn">REBOOT</button>
</div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const gameOverEl = document.getElementById('gameOver');
  const finalScoreEl = document.getElementById('finalScore');
  const restartBtn = document.getElementById('restartBtn');

  // ゲームステート
  let isGameOver = false;
  let score = 0;
  let frameCount = 0;
  let animationId;

  // プレイヤー (自機)
  const player = {
    x: 400,
    y: 500,
    radius: 12,
    color: '#0ff'
  };

  // 敵 (障害物)
  let enemies = [];
  let enemySpeedMultiplier = 1;

  // エフェクト用パーティクル
  let particles = [];

  // マウス操作
  canvas.addEventListener('mousemove', (e) => {
    if(isGameOver) return;
    const rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
    player.y = e.clientY - rect.top;
    
    // 画面外に出ないように制限
    if (player.x < player.radius) player.x = player.radius;
    if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
    if (player.y < player.radius) player.y = player.radius;
    if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;
  });

  restartBtn.addEventListener('click', initGame);

  // 敵クラス
  class Enemy {
    constructor() {
      this.width = Math.random() * 30 + 20; // 20~50px
      this.height = Math.random() * 30 + 20; // 20~50px
      this.x = Math.random() * (canvas.width - this.width);
      this.y = -this.height;
      this.speed = (Math.random() * 4 + 3) * enemySpeedMultiplier;
      this.color = Math.random() > 0.5 ? '#f0f' : '#ff0'; // マゼンタまたはイエロー
    }

    update() {
      this.y += this.speed;
    }

    draw() {
      ctx.shadowBlur = 15;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.width, this.height);
      ctx.shadowBlur = 0; // リセット
    }
  }

  // パーティクルクラス (爆発エフェクト用)
  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 12;
      this.vy = (Math.random() - 0.5) * 12;
      this.life = 1;
      this.color = color;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= 0.02; // 徐々に消える
    }

    draw() {
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, 4, 4);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }
  }

  function createExplosion(x, y, color) {
    for (let i = 0; i < 40; i++) {
      particles.push(new Particle(x, y, color));
    }
  }

  // ゲームの初期化処理
  function initGame() {
    isGameOver = false;
    score = 0;
    frameCount = 0;
    enemies = [];
    particles = [];
    enemySpeedMultiplier = 1;
    gameOverEl.style.display = 'none';
    scoreEl.innerText = score;
    canvas.style.cursor = 'none';
    
    player.x = canvas.width / 2;
    player.y = canvas.height - 100;

    if (animationId) cancelAnimationFrame(animationId);
    gameLoop();
  }

  // プレイヤーの描画
  function drawPlayer() {
    ctx.shadowBlur = 20;
    ctx.shadowColor = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = player.color;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // スラスターの軌跡エフェクト
    ctx.beginPath();
    ctx.moveTo(player.x, player.y + player.radius);
    ctx.lineTo(player.x - 6, player.y + player.radius + 18);
    ctx.lineTo(player.x + 6, player.y + player.radius + 18);
    ctx.fillStyle = 'rgba(0, 255, 255, 0.6)';
    ctx.fill();
  }

  // 衝突判定 (円と矩形)
  function checkCollision(enemy) {
    const testX = Math.max(enemy.x, Math.min(player.x, enemy.x + enemy.width));
    const testY = Math.max(enemy.y, Math.min(player.y, enemy.y + enemy.height));

    const distX = player.x - testX;
    const distY = player.y - testY;
    const distance = Math.sqrt((distX * distX) + (distY * distY));

    // 少し当たり判定を甘くする（プレイヤーの半径より少し小さめ）
    return distance <= player.radius * 0.8;
  }

  // 背景のグリッド描画 (サイバーパンク風)
  function drawGrid() {
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
    ctx.lineWidth = 1;

    // 流れるような背景エフェクト
    const offset = (frameCount * 2) % 50;

    ctx.beginPath();
    for (let i = 0; i < canvas.width; i += 50) {
      ctx.moveTo(i, 0);
      ctx.lineTo(i, canvas.height);
    }
    for (let i = 0; i < canvas.height; i += 50) {
      ctx.moveTo(0, i + offset);
      ctx.lineTo(canvas.width, i + offset);
    }
    ctx.stroke();
  }

  // メインゲームループ
  function gameLoop() {
    if (isGameOver) return;

    // 少し残像を残すために半透明の黒で塗りつぶす
    ctx.fillStyle = 'rgba(5, 5, 16, 0.35)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    frameCount++;

    // 時間経過で難易度(スピード)アップ
    if (frameCount % 600 === 0) {
      enemySpeedMultiplier += 0.15;
    }

    // 敵のスポーン制御 (徐々にスポーン間隔を短くする)
    let spawnRate = Math.max(8, 25 - Math.floor(frameCount / 300));
    if (frameCount % spawnRate === 0) {
      enemies.push(new Enemy());
    }

    // パーティクルの更新と描画
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // 敵の更新と描画
    for (let i = enemies.length - 1; i >= 0; i--) {
      const enemy = enemies[i];
      enemy.update();
      enemy.draw();

      // 衝突判定
      if (checkCollision(enemy)) {
        gameOver();
      }

      // 画面外に出た敵を削除し、スコアを加算
      if (enemy.y > canvas.height) {
        enemies.splice(i, 1);
        score += 10;
        scoreEl.innerText = score;
      }
    }

    drawPlayer();

    if (!isGameOver) {
      animationId = requestAnimationFrame(gameLoop);
    }
  }

  // ゲームオーバー処理
  function gameOver() {
    isGameOver = true;
    createExplosion(player.x, player.y, player.color); // プレイヤー爆発
    
    let explodeFrames = 40;
    
    // 爆発エフェクトだけ少し描画し続けてから止める
    function finishDeath() {
      ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
      }
      
      explodeFrames--;
      if (explodeFrames > 0) {
        requestAnimationFrame(finishDeath);
      } else {
        canvas.style.cursor = 'default';
        finalScoreEl.innerText = score;
        gameOverEl.style.display = 'block';
      }
    }
    finishDeath();
  }

  // ゲーム開始
  initGame();
</script>
</body>
</html>
